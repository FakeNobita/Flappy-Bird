<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #title {
    color: #FFD700;
    font-size: 20px;
    text-shadow: 3px 3px 0 #b8860b, 0 0 20px rgba(255, 215, 0, 0.4);
    letter-spacing: 2px;
  }

  #canvas {
    border: 3px solid #FFD700;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.25), 0 0 80px rgba(255, 215, 0, 0.1);
    cursor: pointer;
    image-rendering: pixelated;
  }

  #score-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    color: #FFD700;
    font-size: 10px;
  }

  #instructions {
    color: rgba(255, 215, 0, 0.5);
    font-size: 8px;
    text-align: center;
  }

  #image-guide {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: rgba(0,0,0,0.8);
    border: 1px solid #FFD700;
    border-radius: 8px;
    padding: 12px 16px;
    color: #FFD700;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.8;
    max-width: 260px;
  }
  #image-guide h3 { margin-bottom: 8px; font-size: 12px; color: #fff; }
  #image-guide code { color: #7fffd4; font-size: 10px; }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="title">🐦 FLAPPY BIRD</div>
  <div id="score-bar">
    <span>SCORE: <span id="score-display">0</span></span>
    <span>BEST: <span id="best-display">0</span></span>
  </div>
  <canvas id="canvas" width="360" height="560"></canvas>
  <div id="instructions">SPACE / TAP to flap</div>
</div>

<!-- <div id="image-guide">
  <h3>🖼️ Replace Placeholders</h3>
  In the JS below, swap these variables:<br><br>
  <code>BIRD_IMG_SRC</code> → your bird image URL<br>
  <code>PIPE_IMG_SRC</code> → your pipe image URL<br>
  <code>BG_IMG_SRC</code> → your background image URL<br><br>
  Images are loaded automatically on start.
</div> -->

<script>
// ─── IMAGE PLACEHOLDERS ──────────────────────────────────────
// Replace these with real URLs or local paths to your images
const BIRD_IMG_SRC = null;   // e.g. "./bird.png" or "https://..."
const PIPE_IMG_SRC = null;   // e.g. "./pipe.png"
const BG_IMG_SRC   = null;   // e.g. "./background.png"
// ─────────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Load images (or use null if not provided)
function loadImg(src) {
  if (!src) return null;
  const img = new Image();
  img.src = src;
  return img;
}
const birdImg = loadImg(BIRD_IMG_SRC);
const pipeImg = loadImg(PIPE_IMG_SRC);
const bgImg   = loadImg(BG_IMG_SRC);

// ─── GAME STATE ──────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0;
let raf;

// Bird
const BIRD_W = 44, BIRD_H = 34;
let bird, vel;

// Pipes
const PIPE_W = 64, GAP = 150, PIPE_SPEED = 2.8;
let pipes, frameCount;

// Ground
const GROUND_H = 80;
const groundY = H - GROUND_H;

// Parallax layers (fallback background)
let bgScroll = 0, cloudScroll = 0;

function resetGame() {
  bird      = { x: 80, y: H / 2, rot: 0 };
  vel       = 0;
  pipes     = [];
  frameCount = 0;
  score     = 0;
  document.getElementById('score-display').textContent = 0;
}

// ─── INPUT ───────────────────────────────────────────────────
function flap() {
  if (state === 'dead') return;
  if (state === 'idle') { state = 'playing'; gameLoop(); }
  vel = -7.5;
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

// ─── DRAW HELPERS ────────────────────────────────────────────

function drawFallbackBg() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, groundY);
  sky.addColorStop(0, '#4EC0CA');
  sky.addColorStop(1, '#87CEEB');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, groundY);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  [[((cloudScroll * 0.3) % (W + 120)) - 60, 60, 90, 30],
   [((cloudScroll * 0.5 + 180) % (W + 120)) - 60, 110, 70, 24],
   [((cloudScroll * 0.2 + 300) % (W + 120)) - 60, 80, 110, 32]
  ].forEach(([cx, cy, cw, ch]) => {
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  cloudScroll += 0.6;

  // Ground
  ctx.fillStyle = '#DEB887';
  ctx.fillRect(0, groundY, W, GROUND_H);
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, groundY, W, 8);

  // Ground grass
  ctx.fillStyle = '#5A9E3A';
  ctx.fillRect(0, groundY, W, 12);

  // Ground stripes (scrolling)
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let i = 0; i < 12; i++) {
    const sx = ((bgScroll * 2 + i * 50) % (W + 50)) - 25;
    ctx.fillRect(sx, groundY + 12, 30, GROUND_H);
  }
  bgScroll += PIPE_SPEED;
}

function drawBgImage() {
  if (bgImg && bgImg.complete) {
    ctx.drawImage(bgImg, 0, 0, W, H);
  } else {
    drawFallbackBg();
  }
}

function drawPipe(pipe) {
  const topH    = pipe.topH;
  const bottomY = topH + GAP;
  const bottomH = groundY - bottomY;

  if (pipeImg && pipeImg.complete) {
    // Top pipe (flipped)
    ctx.save();
    ctx.translate(pipe.x + PIPE_W / 2, topH / 2);
    ctx.scale(1, -1);
    ctx.drawImage(pipeImg, -PIPE_W / 2, -topH / 2, PIPE_W, topH);
    ctx.restore();
    // Bottom pipe
    ctx.drawImage(pipeImg, pipe.x, bottomY, PIPE_W, bottomH);
  } else {
    // Fallback pipe drawing
    const grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_W, 0);
    grad.addColorStop(0, '#3aad3a');
    grad.addColorStop(0.4, '#5fd65f');
    grad.addColorStop(1, '#2d8a2d');
    ctx.fillStyle = grad;

    // Top pipe body
    ctx.fillRect(pipe.x + 4, 0, PIPE_W - 8, topH - 16);
    // Top pipe cap
    ctx.fillRect(pipe.x, topH - 16, PIPE_W, 16);

    // Bottom pipe cap
    ctx.fillRect(pipe.x, bottomY, PIPE_W, 16);
    // Bottom pipe body
    ctx.fillRect(pipe.x + 4, bottomY + 16, PIPE_W - 8, bottomH - 16);

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(pipe.x + 6, 0, 10, topH - 16);
    ctx.fillRect(pipe.x + 6, bottomY + 16, 10, bottomH - 16);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  if (birdImg && birdImg.complete) {
    ctx.drawImage(birdImg, -BIRD_W / 2, -BIRD_H / 2, BIRD_W, BIRD_H);
  } else {
    // Fallback pixel-ish bird
    // Body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    ctx.ellipse(-4, 4, 12, 7, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(10, -5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(12, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(13, -6, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.moveTo(18, -2);
    ctx.lineTo(26, 1);
    ctx.lineTo(18, 4);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawOverlay() {
  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FFD700';
    ctx.font = '14px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS SPACE', W / 2, H / 2 - 20);
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#fff';
    ctx.fillText('or TAP to start', W / 2, H / 2 + 10);
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#FF4444';
    ctx.font = '18px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);

    ctx.fillStyle = '#FFD700';
    ctx.font = '11px "Press Start 2P"';
    ctx.fillText('SCORE: ' + score, W / 2, H / 2);
    ctx.fillText('BEST:  ' + best, W / 2, H / 2 + 28);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '9px "Press Start 2P"';
    ctx.fillText('tap to restart', W / 2, H / 2 + 70);
  }
}

// ─── PHYSICS & COLLISION ─────────────────────────────────────
const GRAVITY = 0.45;

function update() {
  if (state !== 'playing') return;

  frameCount++;
  vel += GRAVITY;
  bird.y += vel;
  bird.rot = Math.min(Math.PI / 2.5, Math.max(-0.4, vel * 0.06));

  // Spawn pipes
  if (frameCount % 90 === 0) {
    const minTop = 60, maxTop = groundY - GAP - 60;
    pipes.push({ x: W + 10, topH: Math.random() * (maxTop - minTop) + minTop, passed: false });
  }

  // Move & score pipes
  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.passed && p.x + PIPE_W < bird.x) {
      p.passed = true;
      score++;
      document.getElementById('score-display').textContent = score;
      if (score > best) { best = score; document.getElementById('best-display').textContent = best; }
    }
  }
  pipes = pipes.filter(p => p.x > -PIPE_W - 10);

  // Collision: ground / ceiling
  if (bird.y + BIRD_H / 2 > groundY || bird.y - BIRD_H / 2 < 0) die();

  // Collision: pipes
  for (const p of pipes) {
    const bx = bird.x, by = bird.y;
    const margin = 4;
    if (bx + BIRD_W / 2 - margin > p.x && bx - BIRD_W / 2 + margin < p.x + PIPE_W) {
      if (by - BIRD_H / 2 + margin < p.topH || by + BIRD_H / 2 - margin > p.topH + GAP) {
        die();
      }
    }
  }
}

function die() {
  state = 'dead';
  cancelAnimationFrame(raf);
}

// Re-start on tap after death
canvas.addEventListener('click', () => {
  if (state === 'dead') { resetGame(); state = 'idle'; draw(); }
});

// ─── RENDER LOOP ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBgImage();
  pipes.forEach(drawPipe);
  drawBird();
  drawOverlay();
}

function gameLoop() {
  update();
  draw();
  if (state === 'playing') raf = requestAnimationFrame(gameLoop);
}

// ─── INIT ────────────────────────────────────────────────────
resetGame();
draw();
</script>
</body>
</html>
